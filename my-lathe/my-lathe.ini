[EMC]
MACHINE = my-lathe
VERSION = 1.0

[DISPLAY]
DISPLAY = gmoccapy
LATHE = 1
PREFERENCE_FILE_PATH = gmoccapy_preferences
PROGRAM_PREFIX = ../../nc_files/
DEFAULT_LINEAR_VELOCITY = 100
MAX_LINEAR_VELOCITY = 250
MAX_FEED_OVERRIDE = 1.5

[RS274NGC]
RS274NGC_STARTUP_CODE = G18 G90 G94 G97 M5
SUBROUTINE_PATH = ./subroutines

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 0.100
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALFILE = my-lathe.hal
HALFILE = core.hal
HALFILE = spindle.hal
HALFILE = tool-change.hal
POSTGUI_HALFILE = postgui.hal

[TRAJ]
COORDINATES = X Z
AXES = 2
LINEAR_UNITS = mm
DEFAULT_LINEAR_VELOCITY = 50.0
MAX_LINEAR_VELOCITY = 250.0

[KINS]
KINEMATICS = trivkins coordinates=XZ
JOINTS = 2

[EMCIO]
TOOL_TABLE = my-lathe.tool.tbl
TOOL_CHANGE_POSITION = 0 0 50

# ====================== JOINTS ======================
[JOINT_0]   # X Axis
TYPE = LINEAR
HOME = 0
MIN_LIMIT = -200
MAX_LIMIT = 200
MAX_VELOCITY = 150
MAX_ACCELERATION = 300
FERROR = 2
MIN_FERROR = 1
SCALE = 400                    # ← Change to your steps/mm

[JOINT_2]   # Z Axis
TYPE = LINEAR
HOME = 0
MIN_LIMIT = -300
MAX_LIMIT = 5
MAX_VELOCITY = 150
MAX_ACCELERATION = 300
FERROR = 2
MIN_FERROR = 1
SCALE = 400                    # ← Change to your steps/mm

[SPINDLE_0]
MIN_SPEED = 100
MAX_SPEED = 3000
SPEED_TOLERANCE = 50